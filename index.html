<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dice Pool Party 🎲</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#00BCD4">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --pink: #FF4D8D;
      --orange: #FF8C00;
      --purple: #9B59B6;
      --green: #4CAF50;
      --white: #FFFFFF;
      --blue-dark: #1A3A8F;
      --water: #29B6F6;
      --water-deep: #0277BD;
      --water-light: #B3E5FC;
      --sun: #FFD54F;
      --bg: #E0F7FA;
      --tile: rgba(255,255,255,0.75);
      --tile-hover: rgba(255,255,255,0.95);
      --shadow: 0 4px 16px rgba(0,0,0,0.12);
      --radius: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(160deg, #87CEEB 0%, #29B6F6 40%, #0288D1 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* WAVES */
    .waves-bg {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      overflow: hidden;
    }
    .wave {
      position: absolute; bottom: 0; width: 200%; height: 120px;
      background: rgba(255,255,255,0.07);
      border-radius: 50%;
      animation: wave 8s infinite linear;
    }
    .wave:nth-child(2) { height: 90px; animation-duration: 12s; animation-direction: reverse; opacity: 0.06; }
    .wave:nth-child(3) { height: 70px; animation-duration: 6s; opacity: 0.05; bottom: 20px; }
    @keyframes wave { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

    /* BUBBLES */
    .bubbles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .bubble {
      position: absolute; border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.6), rgba(255,255,255,0.1));
      border: 1px solid rgba(255,255,255,0.3);
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0% { transform: translateY(110vh) scale(0.8); opacity: 0; }
      10% { opacity: 0.7; }
      90% { opacity: 0.5; }
      100% { transform: translateY(-10vh) scale(1.1); opacity: 0; }
    }

    /* LAYOUT */
    .app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 12px 12px 80px; }

    /* HEADER */
    header {
      text-align: center; padding: 20px 0 12px;
      animation: splashIn 0.6s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes splashIn { from { transform: scale(0.5) rotate(-5deg); opacity: 0; } to { transform: none; opacity: 1; } }

    .logo-emoji { font-size: 52px; display: block; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3)); }
    .logo-title {
      font-family: 'Baloo 2', cursive; font-size: 28px; font-weight: 800;
      color: white; letter-spacing: 1px;
      text-shadow: 0 3px 0 var(--water-deep), 0 6px 12px rgba(0,0,0,0.3);
      line-height: 1.1;
    }
    .logo-sub { color: var(--water-light); font-size: 13px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }

    /* SCORE CARD */
    .score-card {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 20px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }

    .card-title {
      font-family: 'Baloo 2', cursive; font-weight: 700; font-size: 15px;
      color: white; text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
    }

    /* ROWS */
    .category-row {
      display: grid; grid-template-columns: 44px 1fr auto;
      align-items: center; gap: 8px; margin-bottom: 8px;
    }

    .cat-label {
      display: flex; align-items: center; justify-content: center;
      width: 40px; height: 36px; border-radius: 10px;
      font-size: 18px; flex-shrink: 0;
      box-shadow: 0 3px 6px rgba(0,0,0,0.2);
    }

    .cat-name { font-size: 12px; font-weight: 700; color: white; line-height: 1.2; }
    .cat-desc { font-size: 10px; color: var(--water-light); }

    .score-cells { display: flex; gap: 5px; flex-wrap: wrap; }

    .score-cell {
      width: 44px; height: 36px;
      background: rgba(255,255,255,0.85);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Baloo 2', cursive; font-weight: 700; font-size: 16px;
      color: var(--water-deep);
      cursor: pointer;
      border: 2px solid rgba(255,255,255,0.9);
      transition: all 0.15s;
      position: relative;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    .score-cell:hover, .score-cell:active { transform: scale(1.08); background: white; }
    .score-cell.filled { background: white; border-color: var(--water); color: var(--water-deep); }
    .score-cell.filled::after {
      content: ''; position: absolute; bottom: 3px; right: 3px;
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--water);
    }
    .score-cell.empty-dot {
      color: transparent;
    }
    .score-cell.empty-dot::before {
      content: '·'; color: #ccc; font-size: 22px; position: absolute;
    }

    /* TOTAL ROW */
    .total-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 10px; padding-top: 10px;
      border-top: 1px dashed rgba(255,255,255,0.4);
    }
    .total-label { font-family: 'Baloo 2', cursive; font-size: 16px; font-weight: 800; color: var(--sun); }
    .total-value {
      font-family: 'Baloo 2', cursive; font-size: 28px; font-weight: 800;
      color: white;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
      background: rgba(0,0,0,0.2); padding: 2px 14px; border-radius: 12px;
    }

    /* SECTION DIVIDER */
    .section-divider {
      display: flex; align-items: center; gap: 8px; margin: 14px 0 10px;
    }
    .section-divider span { color: rgba(255,255,255,0.6); font-size: 11px; text-transform: uppercase; letter-spacing: 2px; white-space: nowrap; }
    .section-divider::before, .section-divider::after {
      content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.3);
    }

    /* VICTORY SECTION */
    .victory-section {
      background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,140,0,0.2));
      border: 2px solid rgba(255,215,0,0.5);
      border-radius: 20px; padding: 16px; margin-top: 12px;
      text-align: center;
    }
    .victory-title { font-family: 'Baloo 2', cursive; font-size: 18px; font-weight: 800; color: var(--sun); margin-bottom: 12px; }

    .victory-btns { display: flex; gap: 10px; justify-content: center; }
    .btn-win, .btn-lose {
      flex: 1; padding: 14px 10px;
      border: none; border-radius: 14px; cursor: pointer;
      font-family: 'Baloo 2', cursive; font-weight: 700; font-size: 15px;
      transition: all 0.2s; position: relative; overflow: hidden;
    }
    .btn-win { background: linear-gradient(135deg, #FFD700, #FF8C00); color: white; box-shadow: 0 4px 12px rgba(255,140,0,0.4); }
    .btn-lose { background: rgba(255,255,255,0.2); color: white; border: 2px solid rgba(255,255,255,0.4); }
    .btn-win:active { transform: scale(0.96); }
    .btn-lose:active { transform: scale(0.96); }

    /* STATS BAR */
    .stats-bar {
      display: flex; gap: 8px; margin-top: 12px;
    }
    .stat-chip {
      flex: 1; background: rgba(255,255,255,0.15); border-radius: 12px; padding: 10px 6px;
      text-align: center; border: 1px solid rgba(255,255,255,0.25);
    }
    .stat-num { font-family: 'Baloo 2', cursive; font-size: 22px; font-weight: 800; color: white; }
    .stat-label { font-size: 10px; color: var(--water-light); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

    /* RESET BTN */
    .btn-reset {
      width: 100%; padding: 14px; margin-top: 12px;
      background: rgba(255,255,255,0.15); border: 1px dashed rgba(255,255,255,0.4);
      border-radius: 14px; color: rgba(255,255,255,0.8);
      font-family: 'Baloo 2', cursive; font-weight: 700; font-size: 15px;
      cursor: pointer; letter-spacing: 1px;
      transition: all 0.2s;
    }
    .btn-reset:active { background: rgba(255,255,255,0.25); }

    /* NUMERIC MODAL */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,30,60,0.6); backdrop-filter: blur(4px);
      display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal-panel {
      width: 100%; max-width: 480px;
      background: linear-gradient(180deg, #0288D1 0%, #01579B 100%);
      border-radius: 24px 24px 0 0;
      padding: 20px 20px 40px;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.34,1.2,0.64,1);
      box-shadow: 0 -8px 40px rgba(0,0,0,0.4);
    }
    .modal-overlay.open .modal-panel { transform: translateY(0); }

    .modal-handle { width: 40px; height: 4px; background: rgba(255,255,255,0.3); border-radius: 2px; margin: 0 auto 16px; }
    .modal-cat { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .modal-cat-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
    .modal-cat-name { font-family: 'Baloo 2', cursive; font-size: 18px; font-weight: 700; color: white; }
    .modal-cat-desc { font-size: 12px; color: var(--water-light); }

    .modal-display {
      background: rgba(0,0,0,0.25); border-radius: 14px; padding: 14px;
      text-align: right; margin-bottom: 16px;
      font-family: 'Baloo 2', cursive; font-size: 42px; font-weight: 800;
      color: white; min-height: 74px;
      letter-spacing: 2px;
    }
    .modal-display.empty { color: rgba(255,255,255,0.3); }

    .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .num-btn {
      padding: 18px 10px;
      background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2);
      border-radius: 14px; color: white;
      font-family: 'Baloo 2', cursive; font-weight: 700; font-size: 22px;
      cursor: pointer; transition: all 0.1s; text-align: center;
    }
    .num-btn:active { background: rgba(255,255,255,0.35); transform: scale(0.95); }
    .num-btn.btn-del { color: var(--water-light); }
    .num-btn.btn-ok { background: linear-gradient(135deg, #FFD700, #FF8C00); color: white; border-color: transparent; }
    .num-btn.btn-cancel { color: rgba(255,255,255,0.6); font-size: 14px; }

    /* TOAST */
    .toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px);
      background: white; border-radius: 14px; padding: 12px 20px;
      font-family: 'Baloo 2', cursive; font-size: 16px; font-weight: 700;
      color: var(--water-deep); z-index: 200;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
      transition: transform 0.4s cubic-bezier(0.34,1.4,0.64,1);
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* CONFETTI */
    .confetti-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 150; overflow: hidden; }
    .confetti-piece {
      position: absolute; width: 10px; height: 10px; border-radius: 2px;
      animation: confettiFall 1.5s ease-in forwards;
    }
    @keyframes confettiFall {
      0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

<div class="waves-bg">
  <div class="wave"></div>
  <div class="wave"></div>
  <div class="wave"></div>
</div>
<div class="bubbles" id="bubbles"></div>

<div class="app">
  <header>
    <span class="logo-emoji">🦄</span>
    <div class="logo-title">DICE POOL PARTY</div>
    <div class="logo-sub">🎲 Feuille de score 🎲</div>
  </header>

  <!-- STATS -->
  <div class="stats-bar">
    <div class="stat-chip">
      <div class="stat-num" id="stat-wins">0</div>
      <div class="stat-label">🏆 Victoires</div>
    </div>
    <div class="stat-chip">
      <div class="stat-num" id="stat-games">0</div>
      <div class="stat-label">🎲 Parties</div>
    </div>
    <div class="stat-chip">
      <div class="stat-num" id="stat-best">—</div>
      <div class="stat-label">⭐ Meilleur</div>
    </div>
  </div>

  <!-- SCORE CARD -->
  <div class="score-card" style="margin-top:12px;">
    <div class="card-title">🎲 Dés par couleur</div>
    <div id="color-rows"></div>

    <div class="section-divider"><span>Catégories spéciales</span></div>
    <div id="special-rows"></div>

    <div class="total-row">
      <div class="total-label">∑ TOTAL</div>
      <div class="total-value" id="grand-total">0</div>
    </div>
  </div>

  <!-- VICTOIRE -->
  <div class="victory-section" id="victory-section" style="display:none;">
    <div class="victory-title">🎉 Fin de partie — as-tu gagné ?</div>
    <div class="victory-btns">
      <button class="btn-win" onclick="recordResult(true)">🏆 OUI !</button>
      <button class="btn-lose" onclick="recordResult(false)">💦 Non…</button>
    </div>
  </div>

  <button class="btn-reset" onclick="confirmReset()">🔄 Nouvelle partie</button>
</div>

<!-- MODAL NUMPAD -->
<div class="modal-overlay" id="modal">
  <div class="modal-panel">
    <div class="modal-handle"></div>
    <div class="modal-cat">
      <div class="modal-cat-icon" id="modal-icon"></div>
      <div>
        <div class="modal-cat-name" id="modal-name"></div>
        <div class="modal-cat-desc" id="modal-desc"></div>
      </div>
    </div>
    <div class="modal-display empty" id="modal-display">0</div>
    <div class="numpad">
      <button class="num-btn" onclick="numPress(7)">7</button>
      <button class="num-btn" onclick="numPress(8)">8</button>
      <button class="num-btn" onclick="numPress(9)">9</button>
      <button class="num-btn" onclick="numPress(4)">4</button>
      <button class="num-btn" onclick="numPress(5)">5</button>
      <button class="num-btn" onclick="numPress(6)">6</button>
      <button class="num-btn" onclick="numPress(1)">1</button>
      <button class="num-btn" onclick="numPress(2)">2</button>
      <button class="num-btn" onclick="numPress(3)">3</button>
      <button class="num-btn btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="num-btn" onclick="numPress(0)">0</button>
      <button class="num-btn btn-del" onclick="numDel()">⌫</button>
      <button class="num-btn btn-ok" style="grid-column:1/-1;" onclick="numConfirm()">✓ Valider</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="confetti-wrap" id="confetti"></div>

<script>
// ===================== CATEGORIES =====================
const COLOR_CATS = [
  { id:'pink',   label:'🟥', color:'#FF4D8D', name:'Roses',       desc:'Somme des dés roses' },
  { id:'orange', label:'🟧', color:'#FF8C00', name:'Oranges',     desc:'Somme des dés oranges' },
  { id:'purple', label:'🟪', color:'#9B59B6', name:'Mauves',      desc:'Somme des dés mauves' },
  { id:'green',  label:'🟩', color:'#4CAF50', name:'Verts',       desc:'Somme des dés verts' },
  { id:'white',  label:'⬜', color:'#9E9E9E', name:'Blancs',      desc:'Somme des dés blancs' },
  { id:'blue',   label:'🟦', color:'#1565C0', name:'Bleus',       desc:'Somme des dés bleus' },
];

const SPECIAL_CATS = [
  { id:'rainbow', label:'🌈', color:'#FF6B35', name:'Arc-en-ciel', desc:'Dés de couleurs différentes (→10 pts/dé)' },
  { id:'pair',    label:'🎲', color:'#00ACC1', name:'Paire',       desc:'2 dés identiques' },
  { id:'five',    label:'5️⃣',  color:'#5C6BC0', name:'5',          desc:'Dé affichant 5' },
  { id:'four',    label:'4️⃣',  color:'#7B1FA2', name:'4',          desc:'Dé affichant 4' },
  { id:'three',   label:'3️⃣',  color:'#C62828', name:'3',          desc:'Dé affichant 3' },
  { id:'alldie',  label:'🎊',  color:'#F57F17', name:'Tous les dés','desc':'Tous dans la piscine' },
];

const ALL_CATS = [...COLOR_CATS, ...SPECIAL_CATS];
const COLS = 4; // 4 parties par côté de feuille

// ===================== STATE =====================
let state = {
  scores: {}, // catId -> [val, val, val, val] (null = empty)
  col: 0,     // current game column (0-3)
  wins: 0,
  games: 0,
  best: null,
  resultGiven: false,
};

function loadState() {
  try {
    const s = localStorage.getItem('dpp_state');
    if (s) state = JSON.parse(s);
    // Ensure all cats exist
    ALL_CATS.forEach(c => {
      if (!state.scores[c.id]) state.scores[c.id] = [null,null,null,null];
    });
  } catch(e) {
    initScores();
  }
}
function saveState() {
  localStorage.setItem('dpp_state', JSON.stringify(state));
}
function initScores() {
  ALL_CATS.forEach(c => { state.scores[c.id] = [null,null,null,null]; });
}

// ===================== RENDER =====================
function renderRows(cats, containerId) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  cats.forEach(cat => {
    const row = document.createElement('div');
    row.className = 'category-row';

    // Label
    const lbl = document.createElement('div');
    lbl.className = 'cat-label';
    lbl.style.background = cat.color;
    lbl.style.color = 'white';
    lbl.innerHTML = cat.label;
    row.appendChild(lbl);

    // Name+desc
    const info = document.createElement('div');
    info.innerHTML = `<div class="cat-name">${cat.name}</div><div class="cat-desc">${cat.desc}</div>`;
    row.appendChild(info);

    // Cells
    const cells = document.createElement('div');
    cells.className = 'score-cells';
    for (let i = 0; i < COLS; i++) {
      const cell = document.createElement('div');
      cell.className = 'score-cell';
      const val = state.scores[cat.id][i];
      if (val !== null && val !== undefined) {
        cell.textContent = val;
        cell.classList.add('filled');
      } else {
        cell.classList.add('empty-dot');
      }
      // Highlight current col
      if (i === state.col) {
        cell.style.boxShadow = `0 0 0 2px ${cat.color}, 0 2px 8px rgba(0,0,0,0.2)`;
      }
      cell.addEventListener('click', () => openModal(cat, i));
      cells.appendChild(cell);
    }
    row.appendChild(cells);
    container.appendChild(row);
  });
}

function renderAll() {
  renderRows(COLOR_CATS, 'color-rows');
  renderRows(SPECIAL_CATS, 'special-rows');
  updateTotal();
  updateStats();
  checkAllFilled();
}

function updateTotal() {
  let total = 0;
  ALL_CATS.forEach(cat => {
    const val = state.scores[cat.id][state.col];
    if (val !== null && val !== undefined) total += Number(val);
  });
  document.getElementById('grand-total').textContent = total;
}

function updateStats() {
  document.getElementById('stat-wins').textContent = state.wins;
  document.getElementById('stat-games').textContent = state.games;
  document.getElementById('stat-best').textContent = state.best !== null ? state.best : '—';
}

function checkAllFilled() {
  const allFilled = ALL_CATS.every(cat => {
    const val = state.scores[cat.id][state.col];
    return val !== null && val !== undefined;
  });
  const vs = document.getElementById('victory-section');
  if (allFilled && !state.resultGiven) {
    vs.style.display = 'block';
    vs.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  } else {
    vs.style.display = 'none';
  }
}

// ===================== MODAL =====================
let currentCat = null;
let currentColModal = 0;
let numInput = '';

function openModal(cat, col) {
  currentCat = cat;
  currentColModal = col;
  const existing = state.scores[cat.id][col];
  numInput = existing !== null && existing !== undefined ? String(existing) : '';

  document.getElementById('modal-icon').style.background = cat.color;
  document.getElementById('modal-icon').textContent = cat.label;
  document.getElementById('modal-name').textContent = cat.name;
  document.getElementById('modal-desc').textContent = cat.desc;
  updateDisplay();

  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  currentCat = null; numInput = '';
}

function updateDisplay() {
  const d = document.getElementById('modal-display');
  if (numInput === '') {
    d.textContent = '0';
    d.classList.add('empty');
  } else {
    d.textContent = numInput;
    d.classList.remove('empty');
  }
}

function numPress(n) {
  if (numInput.length >= 4) return;
  numInput += String(n);
  updateDisplay();
}
function numDel() {
  numInput = numInput.slice(0, -1);
  updateDisplay();
}
function numConfirm() {
  if (currentCat === null) return;
  const val = numInput === '' ? 0 : parseInt(numInput, 10);
  state.scores[currentCat.id][currentColModal] = val;
  saveState();
  closeModal();
  renderAll();
  vibrate();
}

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ===================== VICTORY =====================
function recordResult(won) {
  state.games++;
  if (won) {
    state.wins++;
    showConfetti();
    showToast('🏆 Victoire enregistrée !');
  } else {
    showToast('💦 Dommage, la prochaine sera la bonne !');
  }

  // Compute score for best
  let total = 0;
  ALL_CATS.forEach(cat => {
    const val = state.scores[cat.id][state.col];
    if (val !== null && val !== undefined) total += Number(val);
  });
  if (state.best === null || total > state.best) state.best = total;

  state.resultGiven = true;
  document.getElementById('victory-section').style.display = 'none';
  saveState();
  updateStats();

  // Move to next col after 1.5s
  setTimeout(() => {
    advanceColumn();
  }, 1500);
}

function advanceColumn() {
  state.col = (state.col + 1) % COLS;
  state.resultGiven = false;
  saveState();
  renderAll();
}

// ===================== RESET =====================
function confirmReset() {
  if (confirm('Commencer une nouvelle partie ? La colonne actuelle sera réinitialisée.')) {
    ALL_CATS.forEach(cat => { state.scores[cat.id][state.col] = null; });
    state.resultGiven = false;
    saveState();
    renderAll();
    showToast('🎲 Nouvelle partie !');
  }
}

// ===================== UI UTILS =====================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function vibrate() {
  if (navigator.vibrate) navigator.vibrate(30);
}

function showConfetti() {
  const wrap = document.getElementById('confetti');
  wrap.innerHTML = '';
  const colors = ['#FF4D8D','#FF8C00','#FFD700','#4CAF50','#29B6F6','#9B59B6'];
  for (let i = 0; i < 60; i++) {
    const c = document.createElement('div');
    c.className = 'confetti-piece';
    c.style.left = Math.random()*100 + 'vw';
    c.style.top = '-20px';
    c.style.background = colors[Math.floor(Math.random()*colors.length)];
    c.style.borderRadius = Math.random()>0.5 ? '50%' : '2px';
    c.style.width = (8+Math.random()*10)+'px';
    c.style.height = (8+Math.random()*10)+'px';
    c.style.animationDelay = (Math.random()*0.8)+'s';
    c.style.animationDuration = (1.2+Math.random()*1)+'s';
    wrap.appendChild(c);
  }
  setTimeout(() => { wrap.innerHTML = ''; }, 3000);
}

// ===================== BUBBLES =====================
function createBubbles() {
  const wrap = document.getElementById('bubbles');
  for (let i = 0; i < 12; i++) {
    const b = document.createElement('div');
    b.className = 'bubble';
    const size = 8 + Math.random()*20;
    b.style.width = size+'px'; b.style.height = size+'px';
    b.style.left = Math.random()*100+'vw';
    b.style.animationDuration = (8+Math.random()*10)+'s';
    b.style.animationDelay = (Math.random()*12)+'s';
    wrap.appendChild(b);
  }
}

// ===================== INIT =====================
loadState();
createBubbles();
renderAll();
</script>
</body>
